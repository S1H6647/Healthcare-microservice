server:
  port: ${PORT:8083}

spring:
  application:
    name: appointment-service

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/appointments_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:076493}
    driver-class-name: org.postgresql.Driver
    hikari:
      minimum-idle: 1
      maximum-pool-size: 3
      connection-timeout: 30000
      idle-timeout: 180000
      max-lifetime: 240000
      keepalive-time: 60000

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  cloud:
    openfeign:
      circuitbreaker:
        enabled: true  # enables fallback support

  rabbitmq:
    addresses: ${RABBITMQ_ADDRESSES:amqp://guest:guest@localhost:5672/}


logging:
  level:
    com.healthcare.appointment: DEBUG
    com.healthcare.appointment.feign: DEBUG
    feign: DEBUG

resilience4j:
  circuitbreaker:
    instances:
      patient-service:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
      doctor-service:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3

rabbit:
  exchange: healthcare.exchange
  queue: appointment.queue
  routing-key: healthcare.routingkey

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

services:
  url:
    patient-service: ${PATIENT_SERVICE_URL:http://localhost:8081}
    doctor-service: ${DOCTOR_SERVICE_URL:http://localhost:8082}