server:
  port: ${PORT:8090}

spring:
  application:
    name: receptionist-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/receptionist_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:076493}
    hikari:
      minimum-idle: 1
      maximum-pool-size: 3
      connection-timeout: 30000
      idle-timeout: 180000
      max-lifetime: 240000
      keepalive-time: 60000
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    database: postgresql
  flyway:
    enabled: true
    locations: classpath:db/migration


logging:
  level:
    com.healthcare.receptionist: DEBUG
